<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>Cave à Vin</title>

  <!-- PWA / iPhone -->
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Cave à Vin"/>
  <meta name="theme-color" content="#1a0f04"/>
  <link rel="manifest" href="manifest.json"/>

  <!-- Inline SVG icon as apple-touch-icon -->
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='38' fill='%231a0f04'/%3E%3Ccircle cx='96' cy='55' r='18' fill='%238B1A1A'/%3E%3Ccircle cx='76' cy='80' r='18' fill='%238B1A1A'/%3E%3Ccircle cx='116' cy='80' r='18' fill='%238B1A1A'/%3E%3Ccircle cx='56' cy='105' r='18' fill='%238B1A1A'/%3E%3Ccircle cx='96' cy='105' r='18' fill='%238B1A1A'/%3E%3Ccircle cx='136' cy='105' r='18' fill='%238B1A1A'/%3E%3Ccircle cx='76' cy='130' r='18' fill='%238B1A1A'/%3E%3Ccircle cx='116' cy='130' r='18' fill='%238B1A1A'/%3E%3Ccircle cx='96' cy='155' r='18' fill='%238B1A1A'/%3E%3Crect x='93' y='22' width='6' height='26' fill='%236B4226'/%3E%3Cellipse cx='104' cy='20' rx='10' ry='7' fill='%232D5A1B'/%3E%3C/svg%3E"/>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap');
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0e0a05;color:#e8dcc8;font-family:'Cormorant Garamond',Georgia,serif}
    ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:#0e0a05}::-webkit-scrollbar-thumb{background:#1e160a;border-radius:3px}
    .wc{transition:transform 0.2s,border-color 0.2s}.wc:hover{transform:translateY(-3px);border-color:rgba(201,168,76,0.28)!important}
    select option{background:#1a1209}
    input::placeholder{color:#3a2a15}
    /* Safe area for iPhone notch */
    #root{padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useMemo, useRef, useCallback } = React;

const SAMPLE_WINES = [
  { id: 1, name: "Château Margaux", producer: "Château Margaux", region: "Bordeaux", country: "France", vintage: 2015, type: "Red", grape: "Cabernet Sauvignon", bottles: 6, purchasePrice: 580, currentValue: 820, drinkFrom: 2022, drinkUntil: 2045, location: "Rack A-1", rating: 97, notes: "Exceptional depth and elegance. Dark fruit, cedar, and silky tannins.", color: "#8B1A1A" },
  { id: 2, name: "Opus One", producer: "Opus One Winery", region: "Napa Valley", country: "USA", vintage: 2018, type: "Red", grape: "Cabernet Sauvignon", bottles: 3, purchasePrice: 350, currentValue: 420, drinkFrom: 2024, drinkUntil: 2040, location: "Rack B-3", rating: 95, notes: "Plush blackcurrant, mocha and violet. Beautiful structure.", color: "#6B0F1A" },
  { id: 3, name: "Domaine Leflaive Montrachet", producer: "Domaine Leflaive", region: "Burgundy", country: "France", vintage: 2017, type: "White", grape: "Chardonnay", bottles: 2, purchasePrice: 890, currentValue: 1100, drinkFrom: 2021, drinkUntil: 2035, location: "Rack C-1", rating: 98, notes: "Transcendent minerality. Hazelnut, white flowers, and electric acidity.", color: "#C9A84C" },
  { id: 4, name: "Sassicaia", producer: "Tenuta San Guido", region: "Tuscany", country: "Italy", vintage: 2016, type: "Red", grape: "Cabernet Sauvignon", bottles: 12, purchasePrice: 195, currentValue: 280, drinkFrom: 2023, drinkUntil: 2038, location: "Rack A-4", rating: 96, notes: "The original Super Tuscan. Graphite, tobacco and dark cherry.", color: "#722F37" },
  { id: 5, name: "Dom Pérignon", producer: "Moët & Chandon", region: "Champagne", country: "France", vintage: 2012, type: "Sparkling", grape: "Chardonnay / Pinot Noir", bottles: 4, purchasePrice: 200, currentValue: 280, drinkFrom: 2020, drinkUntil: 2035, location: "Rack E-1", rating: 96, notes: "Crystalline purity. Toast, almond, white peach and extraordinary fine mousse.", color: "#D4AF37" },
];

const TYPE_COLORS = { Red:"#8B1A1A", White:"#C9A84C", Sparkling:"#D4AF37", Rosé:"#C97A7A", Dessert:"#A07830" };
const TYPES = ["All","Red","White","Sparkling","Rosé","Dessert"];

const drinkingStatus = (wine) => {
  const year = new Date().getFullYear();
  if (year < wine.drinkFrom) return { label:"Too Young", color:"#4FC3F7", bg:"rgba(79,195,247,0.1)" };
  if (year > wine.drinkUntil) return { label:"Past Peak", color:"#EF5350", bg:"rgba(239,83,80,0.1)" };
  const pct = (year - wine.drinkFrom) / (wine.drinkUntil - wine.drinkFrom);
  if (pct < 0.4) return { label:"Drinking Window", color:"#66BB6A", bg:"rgba(102,187,106,0.1)" };
  if (pct < 0.75) return { label:"Peak Now", color:"#FFA726", bg:"rgba(255,167,38,0.15)" };
  return { label:"Drink Soon", color:"#FF7043", bg:"rgba(255,112,67,0.12)" };
};

const StarRating = ({ rating }) => {
  const stars = Math.round((rating / 100) * 5);
  return (
    <div style={{ display:"flex", gap:2, alignItems:"center" }}>
      {[1,2,3,4,5].map(i => (
        <svg key={i} width="11" height="11" viewBox="0 0 24 24" fill={i <= stars ? "#C9A84C" : "rgba(201,168,76,0.2)"}>
          <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
        </svg>
      ))}
      <span style={{ color:"#C9A84C", fontSize:11, marginLeft:3 }}>{rating}</span>
    </div>
  );
};

const DrinkingBar = ({ wine }) => {
  const year = new Date().getFullYear();
  const start = wine.vintage, end = wine.drinkUntil + 2, total = end - start;
  const fromPct = ((wine.drinkFrom - start) / total) * 100;
  const windowPct = ((wine.drinkUntil - wine.drinkFrom) / total) * 100;
  const nowPct = Math.min(((year - start) / total) * 100, 98);
  return (
    <div style={{ marginTop:8 }}>
      <div style={{ fontSize:10, color:"#6a5a40", marginBottom:4, display:"flex", justifyContent:"space-between" }}>
        <span>{wine.vintage}</span><span>{wine.drinkFrom}–{wine.drinkUntil}</span><span>{wine.drinkUntil}</span>
      </div>
      <div style={{ position:"relative", height:5, background:"rgba(255,255,255,0.05)", borderRadius:3 }}>
        <div style={{ position:"absolute", left:`${fromPct}%`, width:`${windowPct}%`, height:"100%", background:"linear-gradient(90deg,#4FC3F7,#C9A84C,#FF7043)", opacity:0.7, borderRadius:3 }} />
        <div style={{ position:"absolute", left:`${nowPct}%`, top:-2, width:2, height:9, background:"#fff", borderRadius:1 }} />
      </div>
    </div>
  );
};

const AI_PROMPT = `Extract ALL wine entries and return ONLY a valid JSON array, no markdown.
Each object: { "name":string, "producer":string, "region":string, "country":string, "vintage":number, "type":"Red"|"White"|"Sparkling"|"Rosé"|"Dessert", "grape":string, "bottles":number, "purchasePrice":number, "currentValue":number, "drinkFrom":number, "drinkUntil":number, "location":string, "rating":number, "notes":string }
Map flexibly: appellation→region, qty→bottles, price/cost→purchasePrice, varietal→grape, bin/rack→location, score/pts→rating.
Estimate drinkFrom/drinkUntil from vintage if missing: Red +5–20yr, White +2–8yr, Sparkling +3–10yr.
Return ONLY the JSON array.`;

const ImportModal = ({ onClose, onImport }) => {
  const [stage, setStage] = useState("upload");
  const [dragOver, setDragOver] = useState(false);
  const [parsedWines, setParsedWines] = useState([]);
  const [checkedIds, setCheckedIds] = useState(new Set());
  const [error, setError] = useState("");
  const [fileName, setFileName] = useState("");
  const fileRef = useRef();

  const toBase64 = (file) => new Promise((res, rej) => {
    const r = new FileReader(); r.onload = () => res(r.result.split(",")[1]); r.onerror = rej; r.readAsDataURL(file);
  });

  const xlsxToText = async (file) => {
    const ab = await file.arrayBuffer();
    const wb = XLSX.read(ab, { type:"array" });
    return wb.SheetNames.map(n => `Sheet: ${n}\n${XLSX.utils.sheet_to_csv(wb.Sheets[n])}`).join("\n\n");
  };

  const parseFile = useCallback(async (file) => {
    setFileName(file.name); setError(""); setStage("parsing");
    try {
      const isPdf = file.type === "application/pdf";
      const isSheet = /\.(xlsx|xls|csv)$/i.test(file.name);
      if (!isPdf && !isSheet) throw new Error("Please upload a PDF, Excel (.xlsx/.xls) or CSV file.");
      let userContent;
      if (isPdf) {
        const b64 = await toBase64(file);
        userContent = [{ type:"document", source:{ type:"base64", media_type:"application/pdf", data:b64 } }, { type:"text", text:AI_PROMPT }];
      } else {
        const text = await xlsxToText(file);
        userContent = [{ type:"text", text:`File contents:\n\n${text}\n\n${AI_PROMPT}` }];
      }
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST", headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:4000, messages:[{ role:"user", content:userContent }] })
      });
      if (!res.ok) throw new Error(`API error: ${res.status}`);
      const data = await res.json();
      const raw = data.content?.map(b => b.text || "").join("") || "";
      const parsed = JSON.parse(raw.replace(/```json|```/g,"").trim());
      const wines = parsed.map((w,i) => ({ ...w, id:Date.now()+i, color:TYPE_COLORS[w.type]||"#722F37", rating:w.rating||88, bottles:w.bottles||1, drinkFrom:w.drinkFrom||(w.vintage+4), drinkUntil:w.drinkUntil||(w.vintage+15) }));
      setParsedWines(wines); setCheckedIds(new Set(wines.map(w=>w.id))); setStage("preview");
    } catch(e) { setError(e.message||"Failed to parse. Try again."); setStage("upload"); }
  }, []);

  const onDrop = (e) => { e.preventDefault(); setDragOver(false); if(e.dataTransfer.files[0]) parseFile(e.dataTransfer.files[0]); };
  const toggle = (id) => setCheckedIds(s => { const n = new Set(s); n.has(id)?n.delete(id):n.add(id); return n; });

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.9)", zIndex:200, display:"flex", alignItems:"center", justifyContent:"center", padding:16 }} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{ background:"#120e07", border:"1px solid rgba(201,168,76,0.18)", borderRadius:18, width:"100%", maxWidth:640, maxHeight:"88vh", overflow:"auto", padding:28, position:"relative" }}>
        <button onClick={onClose} style={{ position:"absolute", top:14, right:18, background:"none", border:"none", color:"#4a3a22", fontSize:24, cursor:"pointer" }}>×</button>
        <h2 style={{ fontFamily:"Playfair Display,serif", fontSize:20, color:"#e8dcc8", marginBottom:6 }}>AI-Powered Import</h2>
        <p style={{ color:"#6a5a40", fontSize:12, marginBottom:22, lineHeight:1.6 }}>Upload any Excel, CSV or PDF — Claude maps columns automatically.</p>

        <div style={{ display:"flex", alignItems:"center", gap:7, marginBottom:24 }}>
          {[["1","Upload"],["2","AI Analysis"],["3","Review"]].map(([n,lbl],i) => {
            const done=(stage==="parsing"&&i===0)||(stage==="preview"&&i<=1);
            const active=(stage==="upload"&&i===0)||(stage==="parsing"&&i===1)||(stage==="preview"&&i===2);
            return (
              <div key={n} style={{ display:"flex", alignItems:"center", gap:6 }}>
                <div style={{ width:22, height:22, borderRadius:"50%", display:"flex", alignItems:"center", justifyContent:"center", fontSize:10, fontWeight:700, background:done?"#C9A84C":active?"rgba(201,168,76,0.15)":"rgba(255,255,255,0.03)", color:done?"#1a1209":active?"#C9A84C":"#3a2a15", border:active&&!done?"1px solid rgba(201,168,76,0.35)":"none" }}>
                  {done?"✓":n}
                </div>
                <span style={{ fontSize:10, color:active?"#C9A84C":"#3a2a15" }}>{lbl}</span>
                {i<2&&<div style={{ width:16, height:1, background:"rgba(255,255,255,0.06)" }}/>}
              </div>
            );
          })}
        </div>

        {stage==="upload" && (
          <>
            <div onDragOver={e=>{e.preventDefault();setDragOver(true)}} onDragLeave={()=>setDragOver(false)} onDrop={onDrop} onClick={()=>fileRef.current?.click()}
              style={{ border:`2px dashed ${dragOver?"#C9A84C":"rgba(201,168,76,0.18)"}`, borderRadius:12, padding:"40px 24px", textAlign:"center", cursor:"pointer", background:dragOver?"rgba(201,168,76,0.03)":"transparent", transition:"all 0.2s" }}>
              <div style={{ fontSize:34, marginBottom:12 }}>📂</div>
              <div style={{ fontFamily:"Playfair Display,serif", fontSize:16, color:"#e8dcc8", marginBottom:5 }}>Tap to choose your file</div>
              <div style={{ color:"#4a3a22", fontSize:11, marginBottom:16 }}>Excel, CSV or PDF supported</div>
              <span style={{ background:"rgba(201,168,76,0.08)", border:"1px solid rgba(201,168,76,0.22)", color:"#C9A84C", borderRadius:7, padding:"7px 18px", fontSize:12 }}>Browse</span>
            </div>
            <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv,.pdf" style={{ display:"none" }} onChange={e=>e.target.files[0]&&parseFile(e.target.files[0])}/>
            {error && <div style={{ marginTop:12, background:"rgba(239,83,80,0.08)", border:"1px solid rgba(239,83,80,0.25)", borderRadius:8, padding:"9px 12px", color:"#EF5350", fontSize:12 }}>{error}</div>}
          </>
        )}

        {stage==="parsing" && (
          <div style={{ textAlign:"center", padding:"50px 0" }}>
            <div style={{ position:"relative", width:70, height:70, margin:"0 auto 20px" }}>
              <svg width="70" height="70" viewBox="0 0 70 70" style={{ animation:"spin 1.4s linear infinite" }}>
                <style>{`@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}`}</style>
                <circle cx="35" cy="35" r="30" fill="none" stroke="rgba(201,168,76,0.12)" strokeWidth="3"/>
                <path d="M35 5 A30 30 0 0 1 65 35" fill="none" stroke="#C9A84C" strokeWidth="3" strokeLinecap="round"/>
              </svg>
              <div style={{ position:"absolute", inset:0, display:"flex", alignItems:"center", justifyContent:"center", fontSize:22 }}>🍷</div>
            </div>
            <div style={{ fontFamily:"Playfair Display,serif", fontSize:17, color:"#e8dcc8", marginBottom:7 }}>Claude is reading your file…</div>
            <div style={{ color:"#4a3a22", fontSize:12 }}>Mapping columns · Inferring drinking windows</div>
          </div>
        )}

        {stage==="preview" && (
          <>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
              <span style={{ color:"#6a5a40", fontSize:12 }}>Found <strong style={{ color:"#C9A84C" }}>{parsedWines.length}</strong> wines · <strong style={{ color:"#C9A84C" }}>{checkedIds.size}</strong> selected</span>
              <div style={{ display:"flex", gap:10 }}>
                <button onClick={()=>setCheckedIds(new Set(parsedWines.map(w=>w.id)))} style={{ background:"none", border:"none", color:"#C9A84C", fontSize:11, cursor:"pointer" }}>All</button>
                <button onClick={()=>setCheckedIds(new Set())} style={{ background:"none", border:"none", color:"#4a3a22", fontSize:11, cursor:"pointer" }}>None</button>
              </div>
            </div>
            <div style={{ maxHeight:280, overflow:"auto", display:"flex", flexDirection:"column", gap:5, marginBottom:18 }}>
              {parsedWines.map(w => {
                const on = checkedIds.has(w.id);
                return (
                  <div key={w.id} onClick={()=>toggle(w.id)} style={{ display:"flex", gap:9, alignItems:"center", padding:"9px 11px", borderRadius:8, border:`1px solid ${on?"rgba(201,168,76,0.28)":"rgba(255,255,255,0.05)"}`, background:on?"rgba(201,168,76,0.03)":"transparent", cursor:"pointer" }}>
                    <div style={{ width:15, height:15, borderRadius:3, border:`1.5px solid ${on?"#C9A84C":"#2a1f0e"}`, background:on?"#C9A84C":"transparent", flexShrink:0, display:"flex", alignItems:"center", justifyContent:"center" }}>
                      {on&&<svg width="8" height="8" viewBox="0 0 12 12" fill="none" stroke="#1a1209" strokeWidth="2.5"><path d="M2 6l3 3 5-5"/></svg>}
                    </div>
                    <div style={{ width:7, height:7, borderRadius:"50%", background:w.color||"#722F37", flexShrink:0 }}/>
                    <div style={{ flex:1, minWidth:0 }}>
                      <div style={{ fontFamily:"Playfair Display,serif", fontSize:13, color:"#e8dcc8", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{w.name||"Unknown Wine"}</div>
                      <div style={{ fontSize:10, color:"#4a3a22", marginTop:1 }}>{[w.producer,w.region,w.vintage].filter(Boolean).join(" · ")}</div>
                    </div>
                    <div style={{ fontSize:11, color:"#6a5a40", flexShrink:0 }}>{w.type}</div>
                    {w.purchasePrice?<div style={{ fontSize:11, color:"#C9A84C", flexShrink:0 }}>${w.purchasePrice}</div>:null}
                  </div>
                );
              })}
            </div>
            <div style={{ display:"flex", gap:9, justifyContent:"flex-end" }}>
              <button onClick={()=>setStage("upload")} style={{ background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.08)", color:"#6a5a40", borderRadius:7, padding:"8px 16px", cursor:"pointer", fontSize:12, fontFamily:"inherit" }}>Back</button>
              <button disabled={checkedIds.size===0} onClick={()=>{onImport(parsedWines.filter(w=>checkedIds.has(w.id)));onClose();}}
                style={{ background:checkedIds.size>0?"linear-gradient(135deg,#C9A84C,#a07830)":"rgba(255,255,255,0.04)", border:"none", color:checkedIds.size>0?"#1a1209":"#3a2a15", borderRadius:7, padding:"8px 20px", cursor:checkedIds.size>0?"pointer":"not-allowed", fontSize:12, fontWeight:700, fontFamily:"inherit" }}>
                Add {checkedIds.size} wine{checkedIds.size!==1?"s":""}
              </button>
            </div>
          </>
        )}
      </div>
    </div>
  );
};

const WineModal = ({ wine, onClose, onSave, onDelete }) => {
  const [editing, setEditing] = useState(!wine.id);
  const [form, setForm] = useState({ ...wine });
  const set = (k,v) => setForm(f=>({...f,[k]:v}));
  const inp = { background:"rgba(255,255,255,0.04)", border:"1px solid rgba(201,168,76,0.14)", borderRadius:6, color:"#e8dcc8", padding:"7px 11px", fontSize:12, width:"100%", outline:"none", fontFamily:"inherit" };
  const lbl = { fontSize:10, color:"#4a3a22", textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:3, display:"block" };
  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.88)", zIndex:150, display:"flex", alignItems:"center", justifyContent:"center", padding:16 }} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{ background:"#1a1209", border:"1px solid rgba(201,168,76,0.18)", borderRadius:16, width:"100%", maxWidth:560, maxHeight:"90vh", overflow:"auto", padding:26, position:"relative" }}>
        <button onClick={onClose} style={{ position:"absolute", top:12, right:14, background:"none", border:"none", color:"#4a3a22", fontSize:22, cursor:"pointer" }}>×</button>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
          <h2 style={{ fontFamily:"Playfair Display,serif", fontSize:18, color:"#e8dcc8", margin:0 }}>{wine.id?(editing?"Edit Wine":wine.name):"Add Wine"}</h2>
          {wine.id&&!editing&&(
            <div style={{ display:"flex", gap:6 }}>
              <button onClick={()=>setEditing(true)} style={{ background:"rgba(201,168,76,0.08)", border:"1px solid rgba(201,168,76,0.22)", color:"#C9A84C", borderRadius:6, padding:"4px 11px", cursor:"pointer", fontSize:11 }}>Edit</button>
              <button onClick={()=>onDelete(wine.id)} style={{ background:"rgba(239,83,80,0.07)", border:"1px solid rgba(239,83,80,0.22)", color:"#EF5350", borderRadius:6, padding:"4px 11px", cursor:"pointer", fontSize:11 }}>Delete</button>
            </div>
          )}
        </div>
        {!editing&&wine.id ? (
          <div>
            <div style={{ display:"flex", gap:6, marginBottom:16, flexWrap:"wrap" }}>
              {(()=>{const s=drinkingStatus(wine);return <span style={{ background:s.bg, color:s.color, border:`1px solid ${s.color}35`, borderRadius:20, padding:"3px 10px", fontSize:11 }}>{s.label}</span>;})()}
              <span style={{ background:"rgba(255,255,255,0.03)", color:"#6a5a40", border:"1px solid rgba(255,255,255,0.07)", borderRadius:20, padding:"3px 10px", fontSize:11 }}>{wine.type}</span>
              <span style={{ background:"rgba(255,255,255,0.03)", color:"#6a5a40", border:"1px solid rgba(255,255,255,0.07)", borderRadius:20, padding:"3px 10px", fontSize:11 }}>{wine.vintage}</span>
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:16 }}>
              {[["Producer",wine.producer],["Region",wine.region],["Country",wine.country],["Grape",wine.grape],["Bottles",wine.bottles],["Location",wine.location],["Purchase",wine.purchasePrice?`$${wine.purchasePrice}`:"—"],["Value",wine.currentValue?`$${wine.currentValue}`:"—"]].map(([k,v])=>(
                <div key={k}><div style={lbl}>{k}</div><div style={{ color:"#e8dcc8", fontSize:13 }}>{v||"—"}</div></div>
              ))}
            </div>
            <div style={{ marginBottom:12 }}><div style={lbl}>Rating</div><StarRating rating={wine.rating||88}/></div>
            <div style={{ marginBottom:12 }}><div style={lbl}>Drinking Window</div><DrinkingBar wine={wine}/></div>
            {wine.notes&&<div><div style={lbl}>Tasting Notes</div><p style={{ color:"#b8a890", fontSize:12, lineHeight:1.7, fontStyle:"italic" }}>{wine.notes}</p></div>}
          </div>
        ) : (
          <div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"0 12px" }}>
              {[["name","Wine Name","text"],["producer","Producer","text"],["region","Region","text"],["country","Country","text"],["vintage","Vintage","number"],["grape","Grape Variety","text"],["bottles","Bottles","number"],["location","Cellar Location","text"],["purchasePrice","Purchase Price ($)","number"],["currentValue","Current Value ($)","number"],["drinkFrom","Drink From","number"],["drinkUntil","Drink Until","number"],["rating","Rating (0–100)","number"]].map(([k,l,t])=>(
                <div key={k} style={{ marginBottom:10 }}>
                  <label style={lbl}>{l}</label>
                  <input type={t} value={form[k]||""} onChange={e=>set(k,t==="number"?+e.target.value:e.target.value)} style={inp}/>
                </div>
              ))}
              <div style={{ marginBottom:10 }}>
                <label style={lbl}>Type</label>
                <select value={form.type||"Red"} onChange={e=>set("type",e.target.value)} style={inp}>
                  {["Red","White","Sparkling","Rosé","Dessert"].map(t=><option key={t}>{t}</option>)}
                </select>
              </div>
            </div>
            <div style={{ marginBottom:12 }}>
              <label style={lbl}>Tasting Notes</label>
              <textarea value={form.notes||""} onChange={e=>set("notes",e.target.value)} rows={3} style={{ ...inp, resize:"vertical" }}/>
            </div>
            <div style={{ display:"flex", gap:7, justifyContent:"flex-end" }}>
              {wine.id&&<button onClick={()=>setEditing(false)} style={{ background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.07)", color:"#4a3a22", borderRadius:7, padding:"7px 14px", cursor:"pointer", fontSize:12, fontFamily:"inherit" }}>Cancel</button>}
              <button onClick={()=>onSave({...form, color:TYPE_COLORS[form.type]||"#722F37"})} style={{ background:"linear-gradient(135deg,#C9A84C,#a07830)", border:"none", color:"#1a1209", borderRadius:7, padding:"7px 18px", cursor:"pointer", fontSize:12, fontWeight:700, fontFamily:"inherit" }}>
                {wine.id?"Save":"Add to Collection"}
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
};

function App() {
  const [wines, setWines] = useState(SAMPLE_WINES);
  const [search, setSearch] = useState("");
  const [filterType, setFilterType] = useState("All");
  const [filterRegion, setFilterRegion] = useState("All");
  const [filterVintage, setFilterVintage] = useState("");
  const [sortBy, setSortBy] = useState("name");
  const [selected, setSelected] = useState(null);
  const [showAdd, setShowAdd] = useState(false);
  const [showImport, setShowImport] = useState(false);
  const [toast, setToast] = useState(null);

  const regions = useMemo(()=>["All",...[...new Set(wines.map(w=>w.region))].sort()],[wines]);
  const vintages = useMemo(()=>[...new Set(wines.map(w=>w.vintage))].sort((a,b)=>b-a),[wines]);

  const filtered = useMemo(()=>wines.filter(w=>{
    const q=search.toLowerCase();
    return(!q||[w.name,w.producer,w.region,w.grape].some(s=>s?.toLowerCase().includes(q)))
      &&(filterType==="All"||w.type===filterType)
      &&(filterRegion==="All"||w.region===filterRegion)
      &&(!filterVintage||w.vintage===+filterVintage);
  }).sort((a,b)=>{
    if(sortBy==="name") return (a.name||"").localeCompare(b.name||"");
    if(sortBy==="vintage") return b.vintage-a.vintage;
    if(sortBy==="rating") return (b.rating||0)-(a.rating||0);
    if(sortBy==="value") return (b.currentValue||0)-(a.currentValue||0);
    return 0;
  }),[wines,search,filterType,filterRegion,filterVintage,sortBy]);

  const stats = useMemo(()=>({
    total:wines.reduce((s,w)=>s+(w.bottles||0),0),
    value:wines.reduce((s,w)=>s+(w.currentValue||0)*(w.bottles||1),0),
    avg:wines.length?Math.round(wines.reduce((s,w)=>s+(w.rating||0),0)/wines.length):0,
    peak:wines.filter(w=>drinkingStatus(w).label==="Peak Now").length,
  }),[wines]);

  const handleSave=(form)=>{if(form.id)setWines(ws=>ws.map(w=>w.id===form.id?form:w));else setWines(ws=>[...ws,{...form,id:Date.now()}]);setSelected(null);setShowAdd(false);};
  const handleDelete=(id)=>{setWines(ws=>ws.filter(w=>w.id!==id));setSelected(null);};
  const handleImport=(newWines)=>{setWines(ws=>[...ws,...newWines]);setToast(`✓ ${newWines.length} wine${newWines.length!==1?"s":""} added`);setTimeout(()=>setToast(null),4000);};

  const pill=(active,onClick,label)=>(
    <button onClick={onClick} style={{ background:active?"linear-gradient(135deg,#C9A84C,#a07830)":"rgba(255,255,255,0.03)", color:active?"#1a1209":"#5a4a35", border:active?"none":"1px solid rgba(255,255,255,0.07)", borderRadius:20, padding:"5px 12px", cursor:"pointer", fontSize:11, fontWeight:active?700:400, whiteSpace:"nowrap" }}>{label}</button>
  );
  const selStyle={ background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.07)", borderRadius:7, color:"#5a4a35", padding:"6px 10px", fontSize:11, outline:"none", fontFamily:"inherit", cursor:"pointer" };

  return (
    <div style={{ minHeight:"100vh", background:"#0e0a05" }}>
      {toast&&<div style={{ position:"fixed", bottom:26, left:"50%", transform:"translateX(-50%)", background:"linear-gradient(135deg,#1e1608,#2a1f0e)", border:"1px solid rgba(201,168,76,0.3)", borderRadius:9, padding:"11px 22px", color:"#C9A84C", fontSize:13, zIndex:400, boxShadow:"0 8px 30px rgba(0,0,0,0.7)", whiteSpace:"nowrap" }}>{toast}</div>}

      {/* Header */}
      <div style={{ background:"linear-gradient(180deg,#1c1008,#0e0a05)", borderBottom:"1px solid rgba(201,168,76,0.1)", padding:"20px 18px 18px" }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:10, marginBottom:18 }}>
          <div>
            <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:2 }}>
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#C9A84C" strokeWidth="1.5"><path d="M8 3h8M9 3c0 0-2 4-2 8s1.5 5 5 5 5-1 5-5-2-8-2-8M12 16v5M9 21h6"/></svg>
              <h1 style={{ fontFamily:"Playfair Display,serif", fontSize:22, fontWeight:700, color:"#e8dcc8" }}>Cave à Vin</h1>
            </div>
            <p style={{ color:"#3a2a15", fontSize:9, letterSpacing:"0.12em", textTransform:"uppercase" }}>Personal Wine Collection</p>
          </div>
          <div style={{ display:"flex", gap:8 }}>
            <button onClick={()=>setShowImport(true)} style={{ background:"rgba(201,168,76,0.07)", border:"1px solid rgba(201,168,76,0.22)", color:"#C9A84C", borderRadius:8, padding:"8px 14px", cursor:"pointer", fontSize:11, fontFamily:"inherit", display:"flex", alignItems:"center", gap:5 }}>
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
              AI Import
            </button>
            <button onClick={()=>setShowAdd(true)} style={{ background:"linear-gradient(135deg,#C9A84C,#a07830)", border:"none", color:"#1a1209", borderRadius:8, padding:"8px 16px", cursor:"pointer", fontSize:11, fontWeight:700, fontFamily:"inherit" }}>+ Add</button>
          </div>
        </div>
        <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:8 }}>
          {[["Bottles",stats.total,""],["Value",`$${stats.value.toLocaleString()}`, ""],["Avg",stats.avg," pts"],["Peak",stats.peak,""]].map(([l,v,s])=>(
            <div key={l} style={{ background:"rgba(201,168,76,0.03)", border:"1px solid rgba(201,168,76,0.08)", borderRadius:8, padding:"10px 10px" }}>
              <div style={{ fontSize:9, color:"#3a2a15", textTransform:"uppercase", letterSpacing:"0.08em", marginBottom:4 }}>{l}</div>
              <div style={{ fontSize:17, fontWeight:600, color:"#C9A84C" }}>{v}<span style={{ fontSize:10, color:"#5a4a35" }}>{s}</span></div>
            </div>
          ))}
        </div>
      </div>

      {/* Filters */}
      <div style={{ borderBottom:"1px solid rgba(255,255,255,0.04)", padding:"10px 18px", overflowX:"auto" }}>
        <div style={{ display:"flex", gap:8, alignItems:"center", minWidth:"max-content" }}>
          <div style={{ position:"relative" }}>
            <svg style={{ position:"absolute", left:9, top:"50%", transform:"translateY(-50%)" }} width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#3a2a15" strokeWidth="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search…" style={{ background:"rgba(255,255,255,0.02)", border:"1px solid rgba(255,255,255,0.06)", borderRadius:7, color:"#e8dcc8", padding:"6px 9px 6px 26px", fontSize:11, width:120, outline:"none", fontFamily:"inherit" }}/>
          </div>
          <div style={{ display:"flex", gap:4 }}>{TYPES.map(t=>pill(filterType===t,()=>setFilterType(t),t))}</div>
          <select value={filterRegion} onChange={e=>setFilterRegion(e.target.value)} style={{ ...selStyle, color:filterRegion!=="All"?"#C9A84C":"#5a4a35" }}>
            <option value="All">All Regions</option>
            {regions.filter(r=>r!=="All").map(r=><option key={r} value={r}>{r}</option>)}
          </select>
          <select value={filterVintage} onChange={e=>setFilterVintage(e.target.value)} style={{ ...selStyle, color:filterVintage?"#C9A84C":"#5a4a35" }}>
            <option value="">All Vintages</option>
            {vintages.map(v=><option key={v} value={v}>{v}</option>)}
          </select>
          <select value={sortBy} onChange={e=>setSortBy(e.target.value)} style={selStyle}>
            <option value="name">Name</option><option value="vintage">Vintage</option><option value="rating">Rating</option><option value="value">Value</option>
          </select>
        </div>
      </div>

      {/* Grid */}
      <div style={{ padding:"16px 18px" }}>
        {filtered.length===0 ? (
          <div style={{ textAlign:"center", padding:"60px 0", color:"#2a1f0e" }}>
            <div style={{ fontSize:36, marginBottom:10 }}>🍷</div>
            <div style={{ fontFamily:"Playfair Display,serif", fontSize:16, marginBottom:4 }}>No wines found</div>
            <div style={{ fontSize:12 }}>Adjust filters or import a file</div>
          </div>
        ) : (
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))", gap:14 }}>
            {filtered.map(wine=>{
              const status=drinkingStatus(wine);
              return (
                <div key={wine.id} className="wc" onClick={()=>setSelected(wine)}
                  style={{ background:"linear-gradient(145deg,#181006,#0f0c05)", border:"1px solid rgba(255,255,255,0.05)", borderRadius:11, padding:14, cursor:"pointer" }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
                    <div style={{ display:"flex", alignItems:"center", gap:5 }}>
                      <div style={{ width:7,height:7,borderRadius:"50%",background:wine.color||"#722F37",boxShadow:`0 0 5px ${wine.color||"#722F37"}60` }}/>
                      <span style={{ fontSize:9,color:"#3a2a15",textTransform:"uppercase",letterSpacing:"0.07em" }}>{wine.type}·{wine.vintage}</span>
                    </div>
                    <span style={{ fontSize:9,color:status.color,background:status.bg,border:`1px solid ${status.color}30`,borderRadius:12,padding:"2px 7px" }}>{status.label}</span>
                  </div>
                  <h3 style={{ fontFamily:"Playfair Display,serif",fontSize:14,fontWeight:600,color:"#e8dcc8",marginBottom:2,lineHeight:1.3 }}>{wine.name||"Unknown"}</h3>
                  <div style={{ fontSize:10,color:"#3a2a15",marginBottom:10 }}>{wine.producer}</div>
                  <div style={{ display:"flex",justifyContent:"space-between",marginBottom:8 }}>
                    <span style={{ fontSize:10,color:"#5a4a35" }}>📍{wine.region}</span>
                    <span style={{ fontSize:10,color:"#5a4a35" }}>🍾{wine.bottles}</span>
                  </div>
                  <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8 }}>
                    <StarRating rating={wine.rating||88}/>
                    {wine.currentValue?<span style={{ fontSize:11,color:"#C9A84C" }}>${wine.currentValue.toLocaleString()}</span>:null}
                  </div>
                  <DrinkingBar wine={wine}/>
                  {wine.notes&&<p style={{ fontSize:10,color:"#2a1f0e",marginTop:8,lineHeight:1.5,fontStyle:"italic",overflow:"hidden",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical" }}>"{wine.notes}"</p>}
                </div>
              );
            })}
          </div>
        )}
        <div style={{ marginTop:10,textAlign:"right",fontSize:10,color:"#1e160a" }}>{filtered.length} of {wines.length} wines</div>
      </div>

      {selected&&<WineModal wine={selected} onClose={()=>setSelected(null)} onSave={handleSave} onDelete={handleDelete}/>}
      {showAdd&&<WineModal wine={{}} onClose={()=>setShowAdd(false)} onSave={handleSave} onDelete={()=>{}}/>}
      {showImport&&<ImportModal onClose={()=>setShowImport(false)} onImport={handleImport}/>}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);

// Register service worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(()=>{});
  });
}
</script>
</body>
</html>
